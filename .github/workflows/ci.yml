name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      # An explicit -m replaces the "not browser" default from pyproject.toml,
      # so exclude the browser tests here too: this job has no Chromium, and
      # they get their own job below.
      - name: Run tests
        run: pytest -m "not perf and not browser" -q

  # End-to-end point-picking tests. They drive the interactive HTML's JavaScript
  # in a headless Chromium, so they need a browser download and are deselected
  # from the matrix job above (addopts in pyproject.toml). One Python version is
  # enough: what they exercise is the client-side JS, not Python behavior.
  browser:
    name: Point-picking tests (browser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + browser test deps
        run: |
          python -m pip install --upgrade pip
          pip install .[browser]

      - name: Install Chromium
        run: playwright install --with-deps chromium

      # -m browser overrides the "not browser" default in pyproject.toml.
      - name: Run point-picking tests
        run: pytest -m browser -q

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + docs deps
        run: |
          python -m pip install --upgrade pip
          pip install .            # core deps incl. Pillow (used by the gallery scraper)
          pip install -r docs/requirements.txt

      - name: Build HTML docs (warnings are errors)
        run: python -m sphinx -b html -W --keep-going docs docs/_build/html

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-docs
          path: docs/_build/html

      - name: Package docs for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  # Optional: publish the built docs to GitHub Pages on pushes to main.
  # Requires enabling Pages once: repo Settings -> Pages -> Source = "GitHub Actions".
  # (Read the Docs already builds the same site via .readthedocs.yaml.)
  deploy-docs:
    name: Deploy docs to GitHub Pages
    needs: docs
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
